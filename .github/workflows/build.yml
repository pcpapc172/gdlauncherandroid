name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Decode release keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "KEYSTORE_BASE64 secret is missing."
            exit 1
          fi

          mkdir -p app
          printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > app/keystore.jks

          if [ ! -s app/keystore.jks ]; then
            echo "Decoded keystore is empty or missing."
            exit 1
          fi

          echo "Keystore decoded successfully."

      - name: Verify release keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        run: |
          set -euo pipefail

          if [ -z "${KEYSTORE_STORE_PASSWORD}" ]; then
            echo "KEYSTORE_STORE_PASSWORD secret is missing."
            exit 1
          fi

          if [ -z "${KEYSTORE_KEY_ALIAS}" ]; then
            echo "KEYSTORE_KEY_ALIAS secret is missing."
            exit 1
          fi

          keytool -list \
            -keystore app/keystore.jks \
            -storepass "${KEYSTORE_STORE_PASSWORD}" \
            -alias "${KEYSTORE_KEY_ALIAS}" >/dev/null

          echo "Keystore password and alias verified."

      - name: Build signed release APK
        if: github.event_name != 'pull_request'
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GDLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload signed release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: GDLauncher-release-signed
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Remove keystore
        if: always() && github.event_name != 'pull_request'
        run: rm -f app/keystore.jks

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download signed release APK
        uses: actions/download-artifact@v4
        with:
          name: GDLauncher-release-signed
          path: release-apk

      - name: Rename APK
        run: |
          cp release-apk/app-release.apk "GDLauncher-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GD Instance Launcher ${{ github.ref_name }}"
          body: |
            ## GD Instance Launcher ${{ github.ref_name }}

            ### Download
            **GDLauncher-${{ github.ref_name }}.apk** – signed, install directly over the previous version.
          files: "GDLauncher-${{ github.ref_name }}.apk"
          draft: false
          prerelease: false
