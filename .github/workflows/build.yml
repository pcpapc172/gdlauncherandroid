name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # manual trigger button in GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # ── Build release APK (unsigned) ─────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── Upload debug artifact ─────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GDLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Upload release artifact ───────────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: GDLauncher-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  # ── Auto-release on version tags ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             "GDLauncher-${VERSION}-unsigned.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GD Instance Launcher ${{ github.ref_name }}"
          body: |
            ## GD Instance Launcher ${{ github.ref_name }}

            ### Download
            - **GDLauncher-${{ github.ref_name }}-unsigned.apk** – install on your device

            > This APK is unsigned. Enable *Install unknown apps* for your file manager before installing.
          files: "GDLauncher-${{ github.ref_name }}-unsigned.apk"
          draft: false
          prerelease: false
